# Workflow for the 2nd scraping iteration process

# Whenever pull request is made targeting branch initialisation, csv is reset
name: iteration-2

# Workflow's description
run-name: Scrape the products in daily errors (iteration 1) and store raw data 

# Function to schedule the time (UTC), day, month, and year of the workflow process
on:
  schedule:
    - cron: '09 09 * * *' #UTC time
  #workflow_dispatch: # Allows manual testing
  
#on:
#  pull_request:
#    # Sequence of patterns matched against refs/heads
#    branches:
#     - iteration-2  

jobs:
  getdataandrefreshmap:
    runs-on: ubuntu-latest
    
    steps:
      # It checks out the latest content of your repository
      - name: Checkout repo content
        uses: actions/checkout@v4 # checkout the repository content to github runner
        with:
          fetch-depth: 0
      
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11 #install the python needed
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      
      # Installs the required Python dependencies
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi
      
      - name: Run Iteration2.py
        run: |
          python PythonCodes/Iteration2.py
          git status
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "scraping iteration 2 completed"
          git push origin HEAD:main
